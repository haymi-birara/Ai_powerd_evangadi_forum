services:
  db:
    image: mysql:8.0
    container_name: evangadi-forum-db
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: forum_root_dev
      MYSQL_DATABASE: evangadi_forum
      MYSQL_USER: forum_user
      MYSQL_PASSWORD: forum_dev_2026
    volumes:
      - evangadi_forum_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uforum_user", "-pforum_dev_2026"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  evangadi_forum_db_data:
